<svg viewBox="0 0 1400 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060c18"/>
      <stop offset="100%" stop-color="#0a1120"/>
    </linearGradient>
    <style>
      @keyframes nodePulse { 0%,100% { stroke-opacity:.55; } 50% { stroke-opacity:1; } }
      @keyframes dotBlink  { 0%,100% { opacity:1; } 50% { opacity:.25; } }
      @keyframes capFade   { 0%,100% { opacity:.55; } 50% { opacity:1; } }
      .pulse   { animation: nodePulse 2.6s ease-in-out infinite; }
      .livedot { animation: dotBlink 1.4s ease-in-out infinite; }
      .caption { animation: capFade 3s ease-in-out infinite; }
      .nodebox { fill:#0b1626; }
      .title   { font-weight:700; fill:#ffffff; }
      .sub     { fill:#8494ab; font-family:'Courier New',monospace; }
      .chiptxt { font-weight:600; }
      .flowlbl { fill:#5b6b82; font-family:'Courier New',monospace; font-size:10px; }
    </style>
  </defs>

  <rect x="1" y="1" width="1398" height="478" rx="18" fill="url(#bgGrad)" stroke="#152238"/>

  <!-- Header -->
  <circle cx="34" cy="26" r="4" fill="#34d399" class="livedot"/>
  <text x="46" y="30" font-size="11" font-weight="700" letter-spacing="2" fill="#34d399">LIVE</text>
  <text x="700" y="30" font-size="13.5" font-weight="800" letter-spacing="0.5" fill="#e2e8f0" text-anchor="middle">GENERATION → INGESTION → PROCESSING → SERVING</text>
  <text x="1366" y="30" font-size="10" fill="#4d6280" text-anchor="end" font-family="Courier New, monospace">3,000 nodes</text>

  <!-- ============ NODE: IoT Simulator ============ -->
  <g>
    <rect x="24" y="205" width="170" height="110" rx="14" class="nodebox pulse" stroke="#22d3ee" stroke-width="2"/>
    <text x="109" y="234" font-size="22" text-anchor="middle">📡</text>
    <text x="109" y="259" font-size="14" text-anchor="middle" class="title">IoT Simulator</text>
    <text x="109" y="277" font-size="9.5" text-anchor="middle" class="sub">3,000 houses</text>
    <text x="109" y="290" font-size="9.5" text-anchor="middle" class="sub">27 governorates</text>
  </g>

  <!-- ============ NODE: Kafka ============ -->
  <g>
    <rect x="260" y="205" width="150" height="110" rx="14" class="nodebox pulse" stroke="#3b82f6" stroke-width="2"/>
    <text x="335" y="234" font-size="22" text-anchor="middle">📨</text>
    <text x="335" y="259" font-size="14" text-anchor="middle" class="title">Apache Kafka</text>
    <text x="335" y="277" font-size="8.5" text-anchor="middle" class="sub">sensor_data_stream</text>
    <text x="335" y="290" font-size="8.5" text-anchor="middle" class="sub">3 partitions</text>
  </g>

  <!-- ============ NODE: Spark (Medallion) ============ -->
  <g>
    <rect x="470" y="140" width="310" height="240" rx="14" class="nodebox pulse" stroke="#f59e0b" stroke-width="2"/>
    <text x="625" y="163" font-size="12.5" text-anchor="middle" class="title">⚡ Spark Structured Streaming</text>
    <line x1="490" y1="172" x2="760" y2="172" stroke="#1c2c44"/>

    <rect x="500" y="182" width="6" height="34" fill="#b45309"/>
    <rect x="500" y="182" width="250" height="34" rx="6" fill="#0d1a2e" stroke="#b45309" stroke-opacity=".5"/>
    <text x="630" y="203" font-size="11" text-anchor="middle" fill="#fbbf7a" class="chiptxt">🥉 Bronze — Raw Parquet</text>

    <text x="625" y="230" font-size="13" text-anchor="middle" fill="#3a4a63">▼</text>

    <rect x="500" y="234" width="6" height="34" fill="#94a3b8"/>
    <rect x="500" y="234" width="250" height="34" rx="6" fill="#0d1a2e" stroke="#94a3b8" stroke-opacity=".5"/>
    <text x="630" y="255" font-size="11" text-anchor="middle" fill="#cbd5e1" class="chiptxt">🥈 Silver — Cleaned + Enriched</text>

    <text x="625" y="282" font-size="13" text-anchor="middle" fill="#3a4a63">▼</text>

    <rect x="500" y="290" width="6" height="34" fill="#eab308"/>
    <rect x="500" y="290" width="250" height="34" rx="6" fill="#0d1a2e" stroke="#eab308" stroke-opacity=".5"/>
    <text x="630" y="311" font-size="11" text-anchor="middle" fill="#fde68a" class="chiptxt">🥇 Gold — Aggregated → SQL</text>
  </g>

  <!-- ============ NODE: SQL Server ============ -->
  <g>
    <rect x="840" y="205" width="170" height="110" rx="14" class="nodebox pulse" stroke="#10b981" stroke-width="2"/>
    <text x="925" y="234" font-size="22" text-anchor="middle">🗄️</text>
    <text x="925" y="259" font-size="14" text-anchor="middle" class="title">SQL Server 2022</text>
    <text x="925" y="277" font-size="9" text-anchor="middle" class="sub">SmartCityDB</text>
    <text x="925" y="290" font-size="9" text-anchor="middle" class="sub">schema: gold</text>
  </g>

  <!-- ============ NODE: Grafana ============ -->
  <g>
    <rect x="1090" y="40" width="280" height="95" rx="14" class="nodebox pulse" stroke="#f97316" stroke-width="2"/>
    <text x="1130" y="72" font-size="20" text-anchor="middle">📊</text>
    <text x="1165" y="68" font-size="13" class="title">Grafana Dashboards</text>
    <text x="1165" y="86" font-size="9" class="sub">Ops-grade BI · geomap · alerts</text>
    <text x="1165" y="101" font-size="9" fill="#4d6280" class="sub">:3000</text>
  </g>

  <!-- ============ NODE: React ============ -->
  <g>
    <rect x="1090" y="207" width="280" height="95" rx="14" class="nodebox pulse" stroke="#06b6d4" stroke-width="2"/>
    <text x="1130" y="239" font-size="20" text-anchor="middle">🖥️</text>
    <text x="1165" y="235" font-size="13" class="title">React Command Center</text>
    <text x="1165" y="253" font-size="9" class="sub">MapLibre · KPIs · live feed</text>
    <text x="1165" y="268" font-size="9" fill="#4d6280" class="sub">:3001</text>
  </g>

  <!-- ============ NODE: ARIA ============ -->
  <g>
    <rect x="1090" y="374" width="280" height="95" rx="14" class="nodebox pulse" stroke="#a78bfa" stroke-width="2"/>
    <text x="1130" y="406" font-size="20" text-anchor="middle">🤖</text>
    <text x="1165" y="402" font-size="13" class="title">ARIA AI Assistant</text>
    <text x="1165" y="420" font-size="9" class="sub">Gemini · bilingual EN/AR</text>
    <text x="1165" y="435" font-size="9" fill="#4d6280" class="sub">/api/chat</text>
  </g>

  <!-- ============ CONNECTORS ============ -->
  <path id="p1" d="M194,260 L260,260" fill="none" stroke="#1c2c44" stroke-width="2"/>
  <path id="p2" d="M410,260 L470,260" fill="none" stroke="#1c2c44" stroke-width="2"/>
  <path id="p3" d="M780,260 L840,260" fill="none" stroke="#1c2c44" stroke-width="2"/>
  <path id="p4" d="M1010,260 C1055,260 1055,87 1090,87"   fill="none" stroke="#1c2c44" stroke-width="2"/>
  <path id="p5" d="M1010,260 C1050,260 1050,254 1090,254" fill="none" stroke="#1c2c44" stroke-width="2"/>
  <path id="p6" d="M1010,260 C1055,260 1055,421 1090,421" fill="none" stroke="#1c2c44" stroke-width="2"/>

  <text x="227" y="340" text-anchor="middle" class="flowlbl caption">JSON · 30s batches</text>
  <text x="440" y="340" text-anchor="middle" class="flowlbl caption">readStream</text>
  <text x="810" y="340" text-anchor="middle" class="flowlbl caption">JDBC append</text>

  <!-- Flowing particles -->
  <g filter="url(#glow)">
    <circle r="4" fill="#67e8f9"><animateMotion dur="1.4s" repeatCount="indefinite" path="M194,260 L260,260"/></circle>
    <circle r="4" fill="#67e8f9"><animateMotion dur="1.4s" begin="0.7s" repeatCount="indefinite" path="M194,260 L260,260"/></circle>

    <circle r="4" fill="#93c5fd"><animateMotion dur="1.1s" repeatCount="indefinite" path="M410,260 L470,260"/></circle>
    <circle r="4" fill="#93c5fd"><animateMotion dur="1.1s" begin="0.55s" repeatCount="indefinite" path="M410,260 L470,260"/></circle>

    <circle r="4" fill="#6ee7b7"><animateMotion dur="1.1s" repeatCount="indefinite" path="M780,260 L840,260"/></circle>
    <circle r="4" fill="#6ee7b7"><animateMotion dur="1.1s" begin="0.55s" repeatCount="indefinite" path="M780,260 L840,260"/></circle>

    <circle r="3.6" fill="#fdba74"><animateMotion dur="2.4s" repeatCount="indefinite" path="M1010,260 C1055,260 1055,87 1090,87"/></circle>
    <circle r="3.6" fill="#fdba74"><animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite" path="M1010,260 C1055,260 1055,87 1090,87"/></circle>

    <circle r="3.6" fill="#67e8f9"><animateMotion dur="2s" repeatCount="indefinite" path="M1010,260 C1050,260 1050,254 1090,254"/></circle>
    <circle r="3.6" fill="#67e8f9"><animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M1010,260 C1050,260 1050,254 1090,254"/></circle>

    <circle r="3.6" fill="#c4b5fd"><animateMotion dur="2.4s" repeatCount="indefinite" path="M1010,260 C1055,260 1055,421 1090,421"/></circle>
    <circle r="3.6" fill="#c4b5fd"><animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite" path="M1010,260 C1055,260 1055,421 1090,421"/></circle>
  </g>

  <text x="700" y="463" font-size="10" text-anchor="middle" fill="#3d4d66" font-family="Courier New, monospace">
    house_id partition key  ·  10s Bronze/Silver checkpoint  ·  30s Gold checkpoint  ·  MAX(batch_id) = single source of truth
  </text>
</svg>
